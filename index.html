<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ангелина ✦ Лучшая</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    #shader-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      display: block;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(17, 17, 17, 0.65);
      backdrop-filter: blur(8px) saturate(1.2);
      -webkit-backdrop-filter: blur(8px) saturate(1.2);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 24px;
      padding: 52px 44px 44px;
      width: 420px;
      max-width: 92%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: scale(1.02);
      border-color: #1a1a1a;
    }

    .badge {
      display: inline-block;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 30px;
      padding: 4px 18px;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: #aaa;
      text-transform: uppercase;
      margin-bottom: 18px;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(2px);
    }

    .title {
      font-weight: 800;
      font-size: 3.2rem;
      letter-spacing: -0.02em;
      color: #f0f0f0;
      margin-bottom: 4px;
      text-shadow: 0 0 20px rgba(200, 30, 30, 0.3);
    }

    .title span {
      color: #ff3b3b;
      text-shadow: 0 0 30px rgba(255, 40, 40, 0.5);
    }

    .sub {
      color: #c0c0c0;
      font-size: 0.95rem;
      font-weight: 400;
      line-height: 1.8;
      margin-bottom: 24px;
      text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .sub span {
      color: #ff6b6b;
      font-weight: 600;
      text-shadow: 0 0 12px rgba(255, 60, 60, 0.4);
    }

    .divider {
      width: 40px;
      height: 2px;
      background: rgba(255, 80, 80, 0.3);
      margin: 0 auto 24px;
      box-shadow: 0 0 10px rgba(255, 50, 50, 0.2);
    }

    .footer {
      color: #888;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      .card { padding: 32px 20px 28px; }
      .title { font-size: 2.4rem; }
      .sub { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <canvas id="shader-canvas"></canvas>

  <div class="card">
    <div class="badge">✦ Кирилл крутой</div>
    <div class="title"><span>Ангелинка</span></div>
    <div class="sub">
      ✦ <span>самая крутая</span> — ваще любимка йоу,<br>
      Ты <span>веселая и добрая</span>, нам круто <span>ваще да</span>.<br>
      Ты <span>ваще лучашая</span>, и точка.
    </div>
    <div class="divider"></div>
    <div class="footer">йоу просто факт</div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('shader-canvas');
      const ctx = canvas.getContext('2d');
      let width, height;

      const particles = [];
      const PARTICLE_COUNT = 140;

      const palette = [
        { r: 200, g: 40, b: 50 },
        { r: 230, g: 70, b: 80 },
        { r: 255, g: 120, b: 100 },
        { r: 255, g: 60, b: 60 },
        { r: 220, g: 100, b: 70 },
        { r: 180, g: 40, b: 80 },
        { r: 255, g: 180, b: 120 },
      ];

      function initParticles() {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const color = palette[Math.floor(Math.random() * palette.length)];
          particles.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: 1.5 + Math.random() * 4.5,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5,
            color: color,
            alpha: 0.3 + Math.random() * 0.6,
            pulseSpeed: 0.01 + Math.random() * 0.03,
            phase: Math.random() * Math.PI * 2,
            glow: 4 + Math.random() * 12,
          });
        }
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        particles.length = 0;
        initParticles();
      }

      function drawShader() {
        if (!ctx) return;

        const gradient = ctx.createRadialGradient(
          width * 0.5, height * 0.4, 50,
          width * 0.5, height * 0.5, Math.max(width, height) * 0.9
        );
        gradient.addColorStop(0, '#1a0a0a');
        gradient.addColorStop(0.4, '#140808');
        gradient.addColorStop(0.8, '#0a0505');
        gradient.addColorStop(1, '#050202');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);

        const time = Date.now() * 0.0003;
        const cx1 = width * 0.3 + Math.sin(time * 0.5) * width * 0.2;
        const cy1 = height * 0.3 + Math.cos(time * 0.7) * height * 0.2;
        const cx2 = width * 0.7 + Math.sin(time * 0.4 + 2) * width * 0.2;
        const cy2 = height * 0.7 + Math.cos(time * 0.6 + 1) * height * 0.2;

        const grd1 = ctx.createRadialGradient(cx1, cy1, 10, cx1, cy1, 300 + Math.sin(time * 0.3) * 50);
        grd1.addColorStop(0, 'rgba(200, 50, 60, 0.15)');
        grd1.addColorStop(0.5, 'rgba(180, 30, 50, 0.08)');
        grd1.addColorStop(1, 'rgba(80, 10, 20, 0)');
        ctx.fillStyle = grd1;
        ctx.fillRect(0, 0, width, height);

        const grd2 = ctx.createRadialGradient(cx2, cy2, 10, cx2, cy2, 250 + Math.cos(time * 0.5) * 60);
        grd2.addColorStop(0, 'rgba(220, 100, 60, 0.12)');
        grd2.addColorStop(0.6, 'rgba(180, 60, 40, 0.06)');
        grd2.addColorStop(1, 'rgba(40, 10, 10, 0)');
        ctx.fillStyle = grd2;
        ctx.fillRect(0, 0, width, height);

        for (let p of particles) {
          p.x += p.vx;
          p.y += p.vy;

          if (p.x < 0 || p.x > width) p.vx *= -1;
          if (p.y < 0 || p.y > height) p.vy *= -1;

          const dx = width/2 - p.x;
          const dy = height/2 - p.y;
          const dist = Math.sqrt(dx*dx + dy*dy) || 1;
          const force = 0.0004;
          p.vx += dx / dist * force * 0.3;
          p.vy += dy / dist * force * 0.3;

          const maxSpeed = 0.8;
          const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
          if (spd > maxSpeed) {
            p.vx = (p.vx / spd) * maxSpeed;
            p.vy = (p.vy / spd) * maxSpeed;
          }

          p.phase += p.pulseSpeed;
          const alphaPulse = 0.5 + 0.5 * Math.sin(p.phase);
          const currentAlpha = p.alpha * (0.5 + 0.5 * alphaPulse);

          const { r, g, b } = p.color;
          const radius = p.radius * (0.8 + 0.3 * Math.sin(p.phase * 0.7));

          const glowSize = p.glow * (0.8 + 0.4 * Math.sin(p.phase * 0.5));
          const gradientGlow = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowSize);
          gradientGlow.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${currentAlpha * 0.35})`);
          gradientGlow.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${currentAlpha * 0.1})`);
          gradientGlow.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
          ctx.fillStyle = gradientGlow;
          ctx.beginPath();
          ctx.arc(p.x, p.y, glowSize, 0, Math.PI * 2);
          ctx.fill();

          ctx.shadowColor = `rgba(${r}, ${g}, ${b}, 0.6)`;
          ctx.shadowBlur = 16;
          ctx.beginPath();
          ctx.arc(p.x, p.y, radius * 0.7, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${Math.min(r+60, 255)}, ${Math.min(g+40, 255)}, ${Math.min(b+40, 255)}, ${currentAlpha * 0.9})`;
          ctx.fill();

          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(p.x - radius*0.15, p.y - radius*0.15, radius * 0.25, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 255, 255, ${currentAlpha * 0.25})`;
          ctx.fill();

          ctx.shadowBlur = 0;
        }

        const vignette = ctx.createRadialGradient(
          width/2, height/2, Math.min(width, height) * 0.3,
          width/2, height/2, Math.max(width, height) * 0.8
        );
        vignette.addColorStop(0, 'rgba(0,0,0,0)');
        vignette.addColorStop(1, 'rgba(0,0,0,0.2)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = 'rgba(255, 220, 200, 0.2)';
        for (let i = 0; i < 30; i++) {
          const sx = (i * 137 + Math.sin(i * 5 + time) * 50) % width;
          const sy = (i * 271 + Math.cos(i * 7 + time * 0.7) * 40) % height;
          const sr = 0.5 + Math.sin(i + time * 2) * 0.4 + 0.6;
          ctx.beginPath();
          ctx.arc(sx, sy, sr * 0.6, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255, 200, 180, ${0.1 + 0.15 * Math.sin(i + time * 1.3)})`;
          ctx.fill();
        }

        requestAnimationFrame(drawShader);
      }

      let resizeTimeout;
      function handleResize() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          resize();
        }, 100);
      }

      window.addEventListener('resize', handleResize);
      resize();
      drawShader();
    })();
  </script>

</body>
</html>
